<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>참좋은 종합병원 관리자 페이지</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body { background-color: #f1f5f9; font-family: 'Pretendard', sans-serif; color: #334155; }
        
        /* 모던 카드 디자인 */
        .card { 
            border: none; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); 
            background: #ffffff;
            margin-bottom: 1.5rem;
        }
        .card-header { background-color: transparent; border-bottom: 1px solid #f1f5f9; padding: 1.25rem 1.5rem; }
        
        /* 탭 디자인 개선 */
        .nav-tabs { border-bottom: 2px solid #e2e8f0; }
        .nav-tabs .nav-link { 
            border: none; 
            color: #64748b; 
            font-weight: 600; 
            padding: 0.75rem 1.5rem;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .nav-tabs .nav-link:hover { color: #334155; }
        .nav-tabs .nav-link.active { 
            color: #6366f1; 
            background: transparent; 
            border-bottom: 2px solid #6366f1; 
        }

        /* 환자 리스트 아이템 */
        .patient-list-item { 
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        .patient-list-item:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border-color: #cbd5e1; }
        
        /* 시간 표시 박스 */
        .time-value { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
        
        /* 상태 배지 소프트 디자인 */
        .badge-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            min-width: 105px;
            letter-spacing: -0.02em;
        }
        .bg-soft-gray   { background-color: #f1f5f9; color: #64748b; }
        .bg-soft-orange { background-color: #ffedd5; color: #ea580c; }
        .bg-soft-blue   { background-color: #dbeafe; color: #2563eb; }
        .bg-soft-amber  { background-color: #fef3c7; color: #d97706; }
        .bg-soft-teal   { background-color: #ccfbf1; color: #0f766e; }
        .bg-soft-danger { background-color: #fee2e2; color: #ef4444; }
        .bg-soft-primary { background-color: #e0e7ff; color: #6366f1; }
        .bg-soft-purple  { background-color: #f3e8ff; color: #7e22ce; } /* 신규: 에러 상태용 */

        /* 로봇 깜빡임 점 */
        .pulse-dot {
            width: 6px; height: 6px;
            background-color: currentColor;
            border-radius: 50%;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- 모던 아이콘 컨테이너 & 애니메이션 --- */
        .icon-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        /* 크기 및 톤온톤 컬러 */
        .icon-md { width: 36px; height: 36px; font-size: 1.1rem; }
        .icon-lg { width: 56px; height: 56px; font-size: 1.5rem; }
        
        .icon-soft-primary { background-color: #e0e7ff; color: #4f46e5; }
        .icon-soft-warning { background-color: #fef3c7; color: #d97706; }
        .icon-soft-secondary { background-color: #f1f5f9; color: #64748b; }

        /* 상태를 직관적으로 보여주는 애니메이션 */
        .spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .bounce-soft { animation: bounce-soft 2s infinite ease-in-out; }
        @keyframes bounce-soft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15%); }
        }

        /* 테이블 스크롤 컨테이너 */
        .table-scroll-container { max-height: 280px; overflow-y: auto; }
        .table th { background-color: #f8fafc; color: #64748b; font-weight: 600; font-size: 0.85rem; border-bottom: 2px solid #e2e8f0; }
        .table td { border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 디스펜서 버튼 그룹 */
        .btn-action-group .btn { padding: 0.25rem 0.5rem; font-size: 0.75rem; font-weight: 600; }

        /* 설정(수정) 버튼 스타일 */
        .btn-edit-stock {
            padding: 2px 6px;
            font-size: 0.8rem;
            color: #94a3b8;
            border: 1px solid transparent;
            background: transparent;
            transition: all 0.2s;
        }
        .btn-edit-stock:hover {
            color: #6366f1;
            background-color: #e0e7ff;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container-fluid mt-4 px-4 px-lg-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center">
            <div class="icon-circle me-3" style="width: 48px; height: 48px; background-color: #6366f1; color: white; font-size: 1.5rem; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);">
                <i class="bi bi-heart-pulse-fill"></i>
            </div>
            <div>
                <h3 class="fw-bold text-dark mb-1" style="letter-spacing: -0.5px;">참좋은 종합병원 관리자 페이지</h3>
                <span class="text-secondary small fw-semibold" id="lastUpdated">마지막 업데이트: -</span>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3">
            <span class="fw-bold text-secondary small">System Status</span>
            <span id="ros-status" class="badge bg-secondary px-3 py-2 rounded-pill">Connecting...</span>
        </div>
    </div>
    
    <div id="alertContainer"></div>
    
    <div class="row g-4">
        
        <div class="col-xl-8 col-lg-7">
            
            <div class="card mb-4 border-0" style="background: linear-gradient(145deg, #ffffff, #f8fafc);">
                <div class="card-body p-4 d-flex align-items-center">
                    <div class="me-4" id="robotIconWrapper">
                        <div class="icon-circle icon-lg icon-soft-secondary"><i class="bi bi-robot"></i></div>
                    </div>
                    <div id="robotStatusContainer" class="flex-grow-1">
                        <h5 class="fw-bold text-dark mb-1">대기 중</h5>
                        <span class="text-secondary">현재 진행 중인 작업이 없습니다. 새로운 명령을 기다립니다.</span>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold text-dark mb-0"><i class="bi bi-list-task me-2 text-primary"></i>진행 및 대기열</h6>
                </div>
                <div class="card-body p-0">
                    <div class="table-scroll-container">
                        <table class="table table-hover text-center mb-0 align-middle">
                            <thead>
                                <tr>
                                    <th width="10%">No.</th>
                                    <th width="35%">병실 / 환자</th>
                                    <th width="40%">상태</th>
                                    <th width="15%">취소</th>
                                </tr>
                            </thead>
                            <tbody id="orderTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header px-0 pt-0 mx-4 mt-4 border-0">
                    <ul class="nav nav-tabs" id="patientTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active d-flex align-items-center gap-2" data-bs-toggle="tab" data-bs-target="#scheduleTab">
                                <span class="icon-circle icon-md icon-soft-primary"><i class="bi bi-calendar2-check-fill"></i></span>
                                복용 스케줄
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link d-flex align-items-center gap-2" data-bs-toggle="tab" data-bs-target="#directoryTab">
                                <span class="icon-circle icon-md icon-soft-secondary"><i class="bi bi-people-fill"></i></span>
                                전체 환자
                            </button>
                        </li>
                    </ul>
                </div>
                <div class="card-body px-4 tab-content" id="patientTabsContent" style="min-height: 400px; max-height: 600px; overflow-y: auto;">
                    <div class="tab-pane fade show active" id="scheduleTab" role="tabpanel">
                        <div id="patientListContainer"></div>
                    </div>
                    <div class="tab-pane fade" id="directoryTab" role="tabpanel">
                        <div id="patientDirectoryContainer"></div>
                    </div>
                </div>
            </div>

        </div> <div class="col-xl-4 col-lg-5">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-header bg-white pt-4 pb-3">
                    <h6 class="fw-bold text-dark mb-0"><i class="bi bi-box-seam me-2 text-warning"></i>디스펜서 잔여 재고</h6>
                    <p class="text-secondary small mt-1 mb-0">재고가 부족하면 약상자를 수동으로 호출하세요.</p>
                </div>
                <div class="card-body p-4" id="dispenserStatusContainer">
                    <div class="text-center text-secondary small py-4">
                        <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div><br>
                        재고 데이터 로딩 중...
                    </div>
                </div>
            </div>
        </div> </div>
</div>

<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header bg-light border-0 px-4 pt-4 pb-3">
        <h5 class="modal-title fw-bold text-dark" id="modalPatientName">환자 약품 배달 명령</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4 pt-3 pb-4">
        <input type="hidden" id="modalPatientId">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <label class="fw-bold text-secondary small">처방 약품 구성 (순서대로 수령)</label>
            <button type="button" class="btn btn-sm btn-outline-primary fw-bold" onclick="addPillRow()">+ 추가</button>
        </div>
        <div id="pillListContainer"></div>
        <div id="modalResultMessage" class="mt-3 text-center fw-bold small"></div>
      </div>
      <div class="modal-footer bg-light border-0 px-4 py-3">
        <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-primary fw-bold px-4" onclick="submitOrder()">배달</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="stockEditModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header bg-light border-0 px-4 pt-4 pb-3">
        <h6 class="modal-title fw-bold text-dark" id="stockEditTitle">재고 수동 조절</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body px-4 pt-3 pb-3 text-center">
        <input type="hidden" id="editDispenserId">
        <p class="small text-secondary mb-3">현재 <strong id="editPillName" class="text-dark"></strong>의 재고를 입력하세요 (0~14)</p>
        <div class="input-group mb-3 px-3">
            <button class="btn btn-outline-secondary" type="button" onclick="adjustStockValue(-1)">-</button>
            <input type="number" id="editStockValue" class="form-control text-center fw-bold text-primary fs-5" min="0" max="14" value="14">
            <button class="btn btn-outline-secondary" type="button" onclick="adjustStockValue(1)">+</button>
        </div>
      </div>
      <div class="modal-footer bg-light border-0 px-4 py-3 justify-content-center gap-2">
        <button type="button" class="btn btn-light fw-bold px-3" data-bs-dismiss="modal">취소</button>
        <button type="button" class="btn btn-primary fw-bold px-4" onclick="submitStockChange()">저장</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let patientsData = [];
    let availablePills = [];
    let orderModal;
    let stockEditModal;

    document.addEventListener("DOMContentLoaded", () => {
        orderModal = new bootstrap.Modal(document.getElementById('orderModal'));
        stockEditModal = new bootstrap.Modal(document.getElementById('stockEditModal'));

        fetchPatientsData();
        fetchPillsData();
        fetchDashboardData();
        fetchDispenserData();
        fetchInitialRosStatus();
        
        setInterval(() => {
            fetchDashboardData();
            fetchDispenserData();
        }, 3000); 
        initWebSocket();
    });

    // --- 시간 계산 유틸리티 ---
    function getTimeRemaining(scheduleTime) {
        if (!scheduleTime || scheduleTime === '00:00') return null;
        const now = new Date();
        const [hours, minutes] = scheduleTime.split(':').map(Number);
        const targetTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes);
        
        const diffMs = targetTime - now;
        const isOverdue = diffMs < 0;
        const absDiffMins = Math.floor(Math.abs(diffMs) / 60000);
        const h = Math.floor(absDiffMins / 60);
        const m = absDiffMins % 60;
        
        return { displayTime: h > 0 ? `${h}h ${m}m` : `${m}m`, isOverdue: isOverdue, ms: diffMs };
    }

    // --- API 호출 ---
    async function fetchPatientsData() {
        try {
            const response = await fetch('/api/patients');
            if (response.ok) {
                patientsData = await response.json();
                renderScheduleTab();
                renderDirectoryTab();
            }
        } catch (error) { console.error("환자 데이터 로드 실패"); }
    }

    async function fetchPillsData() {
        try {
            const response = await fetch('/api/pills');
            if (response.ok) availablePills = await response.json();
        } catch (error) { console.error("약품 로드 실패"); }
    }

    // --- 환자 렌더링 ---
    function renderScheduleTab() {
        const container = document.getElementById('patientListContainer');
        container.innerHTML = '';
        let scheduledPatients = patientsData.filter(p => p.scheduleTime !== '00:00' && !p.isTaken);
        scheduledPatients.sort((a, b) => a.scheduleTime.localeCompare(b.scheduleTime));

        if (scheduledPatients.length === 0) {
            container.innerHTML = `<div class="text-center text-secondary py-5"><i class="bi bi-emoji-smile fs-1 text-light mb-3 d-block"></i>모든 처방 배달이 완료되었습니다.</div>`;
            return;
        }

        scheduledPatients.forEach(p => {
            const timeInfo = getTimeRemaining(p.scheduleTime);
            const isActive = timeInfo.ms <= 1800000;

            container.innerHTML += `
                <div class="patient-list-item d-flex align-items-center justify-content-between">
                    <div>
                        <span class="badge-status ${timeInfo.isOverdue ? 'bg-soft-danger' : 'bg-soft-primary'} mb-2 d-inline-block">
                            ${timeInfo.isOverdue ? '미복용 경과' : '복용 예정'}
                        </span>
                        <div class="fw-bold fs-5 text-dark">${p.name} <span class="fs-6 text-secondary fw-normal ms-1">(${p.room})</span></div>
                        <div class="text-secondary small mt-1">처방시간: ${p.scheduleTime}</div>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="time-box px-4 border-end">
                            <div class="time-value ${timeInfo.isOverdue ? 'text-danger' : 'text-primary'}">${timeInfo.displayTime}</div>
                            <div class="small text-secondary fw-semibold mt-1">${timeInfo.isOverdue ? '지남' : '남음'}</div>
                        </div>
                        <div class="ms-4">
                            <button class="btn ${isActive ? 'btn-primary' : 'btn-light text-secondary'} fw-bold px-3" 
                                    onclick="openOrderModal('${p.id}')" ${isActive ? '' : 'disabled'}>
                                배달 명령
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function renderDirectoryTab() {
        const container = document.getElementById('patientDirectoryContainer');
        container.innerHTML = '';
        patientsData.forEach(p => {
            const detailId = `detail-${p.id}`;
            container.innerHTML += `
                <div class="card mb-3 border bg-white shadow-none">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <div class="fw-bold fs-5 text-dark">${p.name} <span class="fs-6 text-secondary fw-normal ms-1">(${p.room})</span></div>
                            </div>
                            <button class="btn btn-outline-primary btn-sm fw-bold px-3" onclick="openOrderModal('${p.id}')">수동 처방</button>
                        </div>
                        <button class="btn btn-light btn-sm w-100 text-secondary fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#${detailId}">상세 기록 보기 ▾</button>
                        <div class="collapse mt-3" id="${detailId}">
                            <div class="row g-3 px-2">
                                <div class="col-6 border-end">
                                    <span class="d-block small fw-bold text-secondary mb-2">처방 목록</span>
                                    <ul class="list-unstyled small mb-0">
                                        ${p.prescriptions.length > 0 
                                            ? p.prescriptions.map(rx => `<li class="mb-2"><span class="fw-bold text-dark">${rx.name}</span><br><span class="text-muted">${rx.qty}개</span></li>`).join('')
                                            : '<li class="text-muted">없음</li>'}
                                    </ul>
                                </div>
                                <div class="col-6">
                                    <span class="d-block small fw-bold text-secondary mb-2">복용 이력</span>
                                    <ul class="list-unstyled small mb-0">
                                        ${p.history.length > 0 
                                            ? p.history.map(h => `<li class="mb-2"><span class="fw-bold text-dark">${h.name}</span><br><span class="text-muted">${h.date.split(' ')[1]} (${h.qty}개)</span></li>`).join('')
                                            : '<li class="text-muted">없음</li>'}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // --- 배달 모달 관련 ---
    function openOrderModal(patientId) {
        const patient = patientsData.find(p => p.id === patientId);
        document.getElementById('modalPatientId').value = patient.id;
        document.getElementById('modalPatientName').innerText = `${patient.name} (${patient.room}) 배달`;
        document.getElementById('pillListContainer').innerHTML = '';
        
        if (patient.prescriptions && patient.prescriptions.length > 0) {
            patient.prescriptions.forEach(rx => addPillRow(rx.pillId, rx.qty));
        } else addPillRow();
        orderModal.show();
    }

    function addPillRow(selectedPillId = '', qty = 1) {
        const container = document.getElementById('pillListContainer');
        const rowId = 'pill_row_' + Date.now();
        let optionsHtml = availablePills.map(p => `<option value="${p.id}" ${p.id === selectedPillId ? 'selected' : ''}>${p.display_name}</option>`).join('');
        container.insertAdjacentHTML('beforeend', `
            <div class="d-flex gap-2 align-items-center mb-2 pill-row" id="${rowId}">
                <select class="form-select text-dark fw-semibold" style="flex: 2;">${optionsHtml}</select>
                <input type="number" class="form-control text-center fw-bold pill-qty" style="width: 80px;" value="${qty}" min="1">
                <button type="button" class="btn btn-light text-danger fw-bold" onclick="document.getElementById('${rowId}').remove()"><i class="bi bi-trash3"></i></button>
            </div>
        `);
    }

    async function submitOrder() {
        const patientId = document.getElementById('modalPatientId').value;
        const pillRows = document.querySelectorAll('.pill-row');
        const details = [];

        pillRows.forEach(row => {
            const pillId = row.querySelector('select').value;
            const qty = parseInt(row.querySelector('.pill-qty').value);
            if (qty > 0) details.push({ pill_id: pillId, required_qty: qty });
        });

        if (details.length === 0) { alert("약품을 선택하세요."); return; }

        const resultDiv = document.getElementById('modalResultMessage');
        resultDiv.className = "mt-3 text-center fw-bold text-primary";
        resultDiv.innerText = "Janet에게 임무 전송 중...";

        try {
            const response = await fetch('/api/orders', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ patient_id: patientId, details: details })
            });
            if (response.ok) {
                resultDiv.className = "mt-3 text-center fw-bold text-success";
                resultDiv.innerText = `전송 완료!`;
                fetchDashboardData(); fetchPatientsData();
                setTimeout(() => { orderModal.hide(); resultDiv.innerText = ''; }, 1000);
            } else resultDiv.innerText = `오류 발생`;
        } catch (error) { resultDiv.innerText = "서버 통신 실패"; }
    }

    // --- 대시보드 상태 업데이트 ---
    async function fetchDashboardData() {
        try {
            const response = await fetch('/api/dashboard/orders');
            const data = await response.json();

            // 데이터를 성공적으로 받자마자 시간을 무조건 업데이트
            if (response.ok) {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');

                // 세련되게 초 단위까지 포함한 업데이트 시간 표시
                document.getElementById('lastUpdated').innerHTML = 
                    `<i class="bi bi-arrow-clockwise me-1"></i>${hours}:${minutes}:${seconds} 업데이트됨`;
            }
            const tbody = document.getElementById('orderTableBody');
            if (!response.ok || !data.orders) return;   // 여기서 탈출하더라도 위에서 시간은 이미 갱신됨

            tbody.innerHTML = ''; 
            let displaySequence = 1;
            let activeTaskFound = false;

            const sortedOrders = data.orders.sort((a, b) => {
                if (a.status !== 'PENDING' && b.status === 'PENDING') return -1;
                if (a.status === 'PENDING' && b.status !== 'PENDING') return 1;
                return 0;
            });

            sortedOrders.forEach((order) => {
                if (order.status === 'COMPLETED' || order.status === 'CANCELED') return;
                
                let statusBadge = '';
                switch(order.status) {
                    case 'PENDING': statusBadge = `<span class="badge-status bg-soft-gray">대기 중</span>`; break;
                    case 'MOVING_TO_DELIVERY_BOX': statusBadge = `<span class="badge-status bg-soft-blue"><span class="pulse-dot"></span> 상자 픽업 이동 중</span>`; break;
                    case 'AT_DISPENSER': statusBadge = `<span class="badge-status bg-soft-orange"><span class="pulse-dot"></span> 약품 수령 중</span>`; break;
                    case 'FETCHING_REFILL_BOX': statusBadge = `<span class="badge-status bg-soft-primary"><span class="pulse-dot"></span> 알약 상자 운반 중</span>`; break;
                    case 'PAUSED_FOR_REFILL': 
                    case 'WAITING_REFILL': statusBadge = `<span class="badge-status bg-soft-danger">알약 리필 대기 중</span>`; break;
                    case 'RESUMING_DELIVERY': statusBadge = `<span class="badge-status bg-soft-primary"><span class="pulse-dot"></span> 배달 재개 중</span>`; break;
                    case 'DELIVERING_TO_STATION': 
                    case 'DELIVERING': statusBadge = `<span class="badge-status bg-soft-blue"><span class="pulse-dot"></span> 스테이션 배달 중</span>`; break;
                    case 'ARRIVED': statusBadge = `<span class="badge-status bg-soft-amber">스테이션 대기 중</span>`; break;
                    case 'MOVING_TO_PICKUP': statusBadge = `<span class="badge-status bg-soft-teal"><span class="pulse-dot"></span> 수거 픽업 이동 중</span>`; break;
                    case 'RETURNING_BOX': statusBadge = `<span class="badge-status bg-soft-teal"><span class="pulse-dot"></span> 빈 상자 반납 중</span>`; break;
                    case 'COLLECTING': statusBadge = `<span class="badge-status bg-soft-teal"><span class="pulse-dot"></span> 수거 진행 중</span>`; break;
                    case 'ERROR': statusBadge = `<span class="badge-status bg-soft-purple">오류 발생</span>`; break;
                    default: statusBadge = `<span class="badge-status bg-soft-gray">${order.status}</span>`; break;
                }

                tbody.innerHTML += `
                    <tr>
                        <td class="text-secondary fw-bold">${displaySequence}</td>
                        <td>
                            <div class="fw-bold text-dark">${order.room_no}</div>
                            <div class="small text-secondary">${order.patient_name}</div>
                        </td>
                        <td>${statusBadge}</td>
                        <td><button class="btn btn-sm btn-light text-secondary" onclick="cancelOrder(${order.order_id}, '${order.patient_name}', ${displaySequence})"><i class="bi bi-x-lg"></i></button></td>
                    </tr>
                `;
                displaySequence++;
                
                // 로봇 배너 UI 업데이트
                if (!activeTaskFound && order.status !== 'PENDING' && order.status !== 'ARRIVED') {
                    updateRobotStatusUI(
                        '<div class="icon-circle icon-lg icon-soft-primary"><i class="bi bi-arrow-repeat spin-slow"></i></div>', 
                        '배송 처리 중', 
                        `<span class="fw-bold text-primary">[${order.room_no}] ${order.patient_name}</span> 환자의 배달을 처리하고 있습니다.`
                    );
                    activeTaskFound = true;
                } else if (!activeTaskFound && order.status === 'ARRIVED') {
                    updateRobotStatusUI(
                        '<div class="icon-circle icon-lg icon-soft-warning bounce-soft"><i class="bi bi-bell-fill"></i></div>', 
                        '배송 확인 중', 
                        `<span class="fw-bold text-warning">[${order.room_no}]</span> 스테이션에서 환자가 약을 가져가길 기다립니다.`
                    );
                    activeTaskFound = true;
                }
            });

            if (!activeTaskFound) {
                updateRobotStatusUI(
                    '<div class="icon-circle icon-lg icon-soft-secondary"><i class="bi bi-robot"></i></div>', 
                    '대기 중', 
                    '현재 진행 중인 작업이 없습니다. 새로운 명령을 기다립니다.'
                );
            }
        } catch (error) {}
    }

    // 아이콘 래퍼의 innerHTML을 통째로 교체
    function updateRobotStatusUI(iconHtml, title, desc) {
        document.getElementById('robotIconWrapper').innerHTML = iconHtml;
        document.getElementById('robotStatusContainer').innerHTML = `
            <h5 class="fw-bold text-dark mb-1">${title}</h5>
            <span class="text-secondary small">${desc}</span>
        `;
    }

    async function cancelOrder(orderId, patientName, displaySeq) {
        if (!confirm(`[${patientName}] 환자의 배달을 취소하시겠습니까?`)) return;
        await fetch(`/api/orders/${orderId}`, { method: 'DELETE' });
        fetchDashboardData(); fetchPatientsData();
    }

    // --- 디스펜서 모니터링 ---
    async function fetchDispenserData() {
        try {
            const response = await fetch('/api/dispensers');
            if (!response.ok) return;
            const dispensers = await response.json();
            const container = document.getElementById('dispenserStatusContainer');
            
            container.innerHTML = '';
            
            dispensers.forEach(d => {
                const stockPercent = (d.current_stock / 14) * 100;
                let barColor = 'bg-success';
                if (d.current_stock <= 3) barColor = 'bg-danger';
                else if (d.current_stock <= 7) barColor = 'bg-warning';

                const canRefill = d.current_stock < 14;

                container.innerHTML += `
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <span class="fw-bold text-dark d-block">${d.pill_name}</span>
                                <span class="small text-secondary">ID: ${d.dispenser_id}</span>
                            </div>
                            <div class="text-end">
                                <div class="d-flex align-items-center justify-content-end gap-2 mb-1">
                                    <span class="fw-bold ${d.current_stock <= 3 ? 'text-danger' : 'text-primary'}">${d.current_stock} / 14</span>
                                    <button class="btn-edit-stock" title="수량 강제 변경" 
                                            onclick="openStockEditModal('${d.dispenser_id}', '${d.pill_name}', ${d.current_stock})">
                                        <i class="bi bi-gear-fill"></i>
                                    </button>
                                </div>
                                <div class="btn-group btn-action-group mt-1">
                                    <button class="btn btn-outline-primary" onclick="fetchPillBox('${d.dispenser_id}', '${d.pill_name}')">호출</button>
                                    <button class="btn ${canRefill ? 'btn-outline-secondary' : 'btn-light text-muted'}" 
                                            onclick="sendRefillComplete('${d.dispenser_id}')" ${canRefill ? '' : 'disabled'}>채움</button>
                                </div>
                            </div>
                        </div>
                        <div class="progress rounded-pill bg-light" style="height: 6px;">
                            <div class="progress-bar ${barColor} rounded-pill" style="width: ${stockPercent}%"></div>
                        </div>
                    </div>
                `;
            });
        } catch (error) {}
    }

    async function sendRefillComplete(dispenserId) {
        await fetch(`/api/dispenser/${dispenserId}/refill`, { method: 'POST' });
        hideRefillAlert(dispenserId); fetchDashboardData(); fetchDispenserData();
    }

    async function fetchPillBox(dispenserId, pillName) {
        if (!confirm(`Janet에게 [${pillName}] 약상자를 호출하시겠습니까?`)) return;
        await fetch(`/api/dispensers/${dispenserId}/fetch-box`, { method: 'POST' });
        alert(`명령이 전송되었습니다.`);
    }

    // --- 웹소켓 & 하트비트 ---
    function initWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${protocol}//${window.location.host}/ws/nurse`);
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "ROS_CONNECTION") updateRosStatusUI(data.connected);
            else if (data.type === "STOCK_EMPTY") { showRefillAlert(data.dispenser_id, data.message); fetchDashboardData(); }
            else if (data.type === "REFILL_DONE") hideRefillAlert(data.dispenser_id);
        };
        socket.onclose = () => setTimeout(initWebSocket, 5000);
    }

    function showRefillAlert(dispenserId, message) {
        if (document.getElementById(`alert-${dispenserId}`)) return;
        document.getElementById('alertContainer').insertAdjacentHTML('beforeend', `
            <div id="alert-${dispenserId}" class="alert alert-danger shadow-sm d-flex justify-content-between align-items-center mb-3 border-0">
                <div><strong class="fs-5 me-2">🚨</strong><span class="fw-bold">${message}</span></div>
                <button class="btn btn-danger fw-bold btn-sm px-3" onclick="sendRefillComplete('${dispenserId}')">채움 완료</button>
            </div>
        `);
    }
    function hideRefillAlert(dispenserId) {
        const alertBox = document.getElementById(`alert-${dispenserId}`);
        if (alertBox) alertBox.remove();
    }

    async function fetchInitialRosStatus() {
        try {
            const response = await fetch('/api/robot/connection');
            if (response.ok) {
                const data = await response.json();
                updateRosStatusUI(data.connected);
            }
        } catch (error) { updateRosStatusUI(false); }
    }
    function updateRosStatusUI(isConnected) {
        const badge = document.getElementById("ros-status");
        badge.innerText = isConnected ? "Connected" : "Disconnected";
        badge.className = `badge ${isConnected ? 'bg-success' : 'bg-danger'} px-3 py-2 rounded-pill shadow-sm`;
    }

    // --- 수량 수동 조작 관련 ---
    function openStockEditModal(dispenserId, pillName, currentStock) {
        document.getElementById('editDispenserId').value = dispenserId;
        document.getElementById('editPillName').innerText = pillName;
        document.getElementById('editStockValue').value = currentStock;
        stockEditModal.show();
    }

    function adjustStockValue(amount) {
        const input = document.getElementById('editStockValue');
        let newVal = parseInt(input.value) + amount;
        if (newVal < 0) newVal = 0;
        if (newVal > 14) newVal = 14; // 디스펜서 최대치에 맞게 수정
        input.value = newVal;
    }

    async function submitStockChange() {
        const dispenserId = document.getElementById('editDispenserId').value;
        const newStock = parseInt(document.getElementById('editStockValue').value);
        
        try {
            const response = await fetch(`/api/dispenser/${dispenserId}/force-update`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ stock: newStock })
            });
            
            if (response.ok) {
                stockEditModal.hide();
                fetchDispenserData(); // 바뀐 데이터를 화면에 즉시 반영
            } else {
                alert("재고 변경에 실패했습니다.");
            }
        } catch (error) {
            console.error("재고 강제 변경 에러:", error);
            alert("서버와 통신할 수 없습니다.");
        }
    }

</script>
