# ~/robot_ws/src/project_hospital/config/hospital_env.yaml
server:
  url: "http://10.10.141.47:8000"
  timeout: 3.0
  check_interval: 5.0


environment:
  # 프로젝트 모형 전체 규격
  model_size:
    width: 1.835   # 1835mm
    length: 1.870  # 1870mm

  # 발표 장소 (타일형 그리드)
  presentation_area:
    tile_size: 0.45      # 450mm
    grid_count_x: 9      # 가로 9칸
    grid_count_y: 5      # 세로 5칸
    total_width: 4.05    # 9칸 * 0.45m
    total_length: 2.25   # 5칸 * 0.45m

  # 장애물 및 구조물 규격
  obstacles:
    dispenser:
      width: 0.15    # 150mm
      length: 0.30   # 300mm
      height: 0.40   # [임시] 디스펜서 출구 높이
    wall_height: 0.60 # 폼보드 벽 높이 600mm
    
  # 스테이션의 규격 (환자 병실 앞 약 수령처)
  station:
    width: 0.34
    length: 0.165
    height: 0.163

  # 박스 규격 (OMX 로봇팔의 Pick & Place 계산용)
  boxes:
    storage_box:
      width: 0.05
      length: 0.05
      height: 0.03
    delivery_box:
      width: 0.05
      length: 0.05
      height: 0.03


waypoints:
  # 1. 초기 터틀봇 위치 (대기 장소)
  initial_pose:
    x: 0.339
    y: 0.306
    theta: 0.075
   
  # 2. 약통 수령처 
  pill_dispenser:
    x: -0.419
    y: -1.553
    theta: 0.232

  # 3. 약제실
  storage_boxes:
    "PILL_A": {x: 0.672, y: 0.293, theta: -3.032}
    "PILL_B": {x: 1.5, y: 1.0, theta: 0.0}

  # 4. 가는 길 경유지 
  mid_points:
    wp1: {x: 0.248, y: 0.257, theta: -3.077}
    wp2: {x: -0.503, y: 0.162, theta: -2.959}
    wp3: {x: 0.188, y: -0.679, theta: 0.138}

  # 5. 배송 박스 (BOX_A를 201호 진입 대기점으로 사용)
  delivery_boxes:
    "BOX_A": {x: 0.424, y: -1.499, theta: 2.956}
    "BOX_B": {x: 1.0, y: 1.0, theta: 0.0}

  # 6. 복귀 길 경유지 
  return_points:
    r_wp1: {x: 0.115, y: -0.629, theta: 3.141}
    r_wp2: {x: -0.625, y: -0.392, theta: 1.660}
    r_wp3: {x: -0.536, y: 0.083, theta: 0.434}

# 작업 영역(Workspace) 좌표들
workspaces:
  # 1. 배달 상자 영역
  delivery_box_zone:
    min: [0.0, -0.2, 0.0]
    max: [0.3, 0.2, 0.2]
  
  # 2. 약 상자 영역
  pill_box_zone:
    min: [0.1, -0.2, 0.0]
    max: [0.3, 0.1, 0.1]
  
  # 3. 디스펜서 약품 수령 영역 (센서 인식)
  dispenser_sensor_in_zone:
    min: [0.0, -0.1, 0.0]
    max: [0.15, 0.1, 0.2]
  
  # 4. 디스펜서 센서 리셋 영역 (로봇 쪽으로 당김)
  dispenser_sensor_out_zone:
    min: [0.0, -0.1, 0.0]
    max: [0.05, 0.1, 0.2]
  
  # 5. 환자 스테이션 하역/수거 영역
  station_zone:
    min: [0.1, -0.15, 0.163]
    max: [0.25, 0.15, 0.20]

  # ArUco 마커 ID와 박스/약품 매핑 (비전 인식용)
  aruco_mapping:
    boxes:
      "Box_A": 10
      "Box_B": 11
    pills:
      "PILL_A": 20
      "PILL_B": 21

marker_length_m: 0.028